views:
  - path: ev-charging
    title: EV Charging
    cards:
      - type: entities
        title: Settings
        show_header_toggle: false
        entities:
          - entity: input_number.charge_target
            name: Target SoC
          - entity: input_number.charge_minimum
            name: Charge immediately to
          - entity: input_number.soc_override
            name: Current SoC (fallback)
            secondary_info: last-changed
          - entity: input_datetime.charge_by
            name: Ready by
          - entity: input_button.replan
            name: Replan
            icon: mdi:refresh
      - type: webpage
        url: /local/laadplan.html
        aspect_ratio: 75%
