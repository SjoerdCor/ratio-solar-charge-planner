# HA package — symlink this file to /config/packages/charger.yaml
# and add to configuration.yaml (one-time):
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Then restart Home Assistant.

input_number:
  charge_target:
    name: Charge target (%)
    min: 20
    max: 100
    step: 5
    initial: 80
    unit_of_measurement: "%"
    icon: mdi:battery-charging-80
  charge_minimum:
    name: Charge immediately to (%)
    min: 0
    max: 100
    step: 5
    initial: 0
    unit_of_measurement: "%"
    icon: mdi:battery-charging-low
  soc_override:
    name: Current SoC (%)
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:battery

input_datetime:
  charge_by:
    name: Ready by
    has_date: true
    has_time: true

input_button:
  replan:
    name: Replan
    icon: mdi:refresh
