# HA package — symlink this file to /config/packages/laadplanner.yaml
# and add to configuration.yaml (one-time):
#
#   homeassistant:
#     packages: !include_dir_named packages
#
# Then restart Home Assistant.

input_number:
  laad_doel:
    name: Laaddoel (%)
    min: 20
    max: 100
    step: 5
    initial: 80
    unit_of_measurement: "%"
    icon: mdi:battery-charging-80

input_datetime:
  laad_klaar_om:
    name: Auto klaar om
    has_date: true
    has_time: true

input_button:
  herplan_laadplanner:
    name: Herplan laadplanner
    icon: mdi:refresh
