# Kopieer dit bestand naar config.yaml en vul je eigen waarden in.
# config.yaml staat in .gitignore en wordt nooit gecommit.

locatie:
  latitude: 52.09
  longitude: 5.23
  tijdzone: "Europe/Amsterdam"

panelen:
  - naam: ZO
    kwp: 2.58
    azimuth: -45    # Forecast.Solar: 0=south, negatief=oost (-45 = zuidoost)
    tilt: 35
    aantal: 6
  - naam: NO
    kwp: 1.29
    azimuth: -135   # Forecast.Solar: -135 = noordoost
    tilt: 35
    aantal: 3

auto:
  accu_kwh: 77
  laadvermogen_smart_w: 11000   # W in Smart-modus (3-fase 16A = 11 kW)
  verbruik_kwh_per_jaar: 1200

vast_tarief:
  dag_ct_per_kwh: 27.0    # 06:00–22:00
  nacht_ct_per_kwh: 23.0  # 22:00–06:00

tibber:
  token: "JOUW_TIBBER_TOKEN_HIER"

cache:
  pad: "data/cache"
  max_oud_minuten: 60

homeassistant:
  entiteiten:
    soc_sensor:       "sensor.volkswagen_JOUW_SERIAL_state_of_charge"
    laadmodus_select: "select.ratio_JOUW_SERIAL_charge_mode"
    laad_doel:        "input_number.laad_doel"
    laad_klaar_om:    "input_datetime.laad_klaar_om"
